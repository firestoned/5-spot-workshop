# REAL scenario — a time-scheduled k0s WORKER provisioned over SSH onto a remote
# machine (here: a second lab node / a Colima VM / bare metal).
#
# When the schedule window is OPEN, 5-Spot creates on the management cluster:
#   1. K0sWorkerConfig (bootstrap.cluster.x-k8s.io) — generates the k0s join
#   2. RemoteMachine   (infrastructure.cluster.x-k8s.io) — the SSH target host
#   3. Machine         (cluster.x-k8s.io) — ties them to dev-cluster
# k0smotron's RemoteMachine controller then SSHes to the host and runs the join.
# 5-Spot itself never SSHes — see https://5spot.finos.org/installation/prerequisites/
#
# 📚 ScheduledMachine fields: https://5spot.finos.org/concepts/scheduled-machine/
#    Schedule provider (ADR 0009): https://5spot.finos.org/concepts/schedules/
# ⚠️ DRAFT: confirm RemoteMachine field names (address/port/user/sshKeyRef) against
#    your installed k0smotron release before the event.
#
# Since ADR 0009 the day/hour window lives on a TimeBasedSpotSchedule PROVIDER object
# (the first doc below); the ScheduledMachine references it by name. 5-Spot reads only
# the provider's status.active verdict.
apiVersion: spotschedules.5spot.finos.org/v1alpha1
kind: TimeBasedSpotSchedule
metadata:
  name: business-hours
  namespace: default
spec:
  # WORKSHOP: always-on so the worker joins immediately.
  daysOfWeek: ["mon-sun"]
  hoursOfDay: ["0-23"]
  # Real "business hours": daysOfWeek ["mon-fri"], hoursOfDay ["9-17"]
  timezone: "UTC"
  enabled: true
---
apiVersion: 5spot.finos.org/v1beta1
kind: ScheduledMachine
metadata:
  name: business-hours-worker
  namespace: default
spec:
  clusterName: dev-cluster

  # Administrative master switch (ADR 0009); defaults to true. Flag 3 flips this to
  # false to trigger the drain (the schedule provider stays "always-on").
  enabled: true

  # 5-Spot reaches the HOSTED control plane (to taint/drain the Node) DIRECTLY via this
  # kubeconfig, built by setup-background.sh: the stock workload kubeconfig retargeted to the
  # in-cluster NodePort endpoint (:30443), REAL CA + client cert kept (the client cert is
  # 5-Spot's mTLS identity). setup-background.sh also adds an egress NetworkPolicy permitting
  # the controller to reach :30443 (its default policy only allows the mgmt apiserver on 6443).
  # For CAPD the Node is in the same cluster, so none of this is needed.
  kubeconfigSecretRef:
    name: dev-cluster-kubeconfig-5spot
    key: value

  # Required reference to the TimeBasedSpotSchedule provider above (same namespace).
  # Its status.active is this machine's active/inactive verdict.
  schedule:
    apiVersion: spotschedules.5spot.finos.org/v1alpha1
    kind: TimeBasedSpotSchedule
    name: business-hours

  # Bootstrap: a k0s worker join config (k0smotron).
  bootstrapSpec:
    apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
    kind: K0sWorkerConfig
    spec:
      version: v1.35.5+k0s.0

  # Infrastructure: an SSH-reachable host. ADDRESS is templated by the setup script
  # to the remote node's IP (e.g. node-02 on a multi-node lab). The private key lives
  # in the Secret 'remote-ssh-key' (see remote-ssh-secret.example.yaml).
  infrastructureSpec:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: RemoteMachine
    spec:
      address: "REMOTE_NODE_IP"   # <- replaced at apply time by setup-background.sh
      port: 22
      user: root
      useSudo: false
      sshKeyRef:
        name: remote-ssh-key

  # Same labels/taints as the simplified scenario so the Flag 2 workload matches.
  machineTemplate:
    labels:
      workshop.example.com/pool: spot
    annotations:
      workshop.example.com/owner: platform-team

  nodeTaints:
    - key: workshop.example.com/spot
      value: "true"
      effect: NoSchedule

  priority: 50
  gracefulShutdownTimeout: 5m
  nodeDrainTimeout: 5m
  killSwitch: false
